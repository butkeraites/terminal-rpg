name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  coverage:
    name: coverage gate (≥95%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "coverage>=7"

      - name: Run tests under coverage
        run: python -m coverage run --source=terminalquest -m pytest -q

      - name: Enforce coverage threshold
        # `fail_under = 95` is set in pyproject.toml; this step fails the
        # build if total coverage drops below that. Treat the floor as a
        # ratchet: when we push higher, bump it.
        run: python -m coverage report

  balance:
    name: balance regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Balance check
        run: python -m tools.sim --check
